<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Railway Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🚂</div>
    <div class="brand-text">
      <span class="brand-name">RailAdmin</span>
      <span class="brand-sub">Control Center</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item active" data-page="dashboard" href="#">Dashboard</a>
    <a class="nav-item" data-page="transactions" href="#">Transactions</a>
    <a class="nav-item" data-page="balances" href="#">Balances</a>
    <a class="nav-item" data-page="analytics" href="#">Analytics</a>
    <a class="nav-item" data-page="reports" href="#">Reports</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-badge">
      <div class="admin-avatar">A</div>
      <div>
        <div class="admin-name">Administrator</div>
        <div class="admin-role">Super Admin</div>
      </div>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="page-title" id="pageTitle">Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="clock" id="clock"></div>
      <div class="db-status" id="dbStatus"><span class="status-dot"></span> Connected</div>
    </div>
  </header>

  <div class="content" id="content">
    <!-- DASHBOARD, ANALYTICS, REPORTS pages remain same as before -->
    <!-- (You can keep your existing pages here) -->

    <!-- TRANSACTIONS PAGE -->
    <div class="page" id="page-transactions">
      <div class="filter-bar">
        <input type="text" class="filter-input" id="searchInput" placeholder="🔍 Search employee, items..." />
        <select class="filter-select" id="deptFilter"><option value="">All Departments</option></select>
        <select class="filter-select" id="catFilter"><option value="">All Categories</option></select>
        <button class="btn-clear" id="clearFilters">Clear</button>
      </div>
      <div class="table-card">
        <div class="table-meta">
          <span id="tableInfo">Loading…</span>
        </div>
        <div class="table-scroll">
          <table class="data-table" id="txTable">
            <thead>
              <tr>
                <th>#TID</th>
                <th>Emp ID</th>
                <th>Employee</th>
                <th>Department</th>
                <th>Category</th>
                <th>Items</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody id="txBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- BALANCES PAGE -->
    <div class="page" id="page-balances">
      <h2>Category Wise Available Balance</h2>
      <div class="table-card">
        <div class="table-meta">
          <span id="balanceInfo">Available Funds Overview</span>
        </div>
        <div class="table-scroll">
          <table class="data-table" id="balanceTable">
            <thead>
              <tr>
                <th>Cat ID</th>
                <th>Category Name</th>
                <th>Available Balance</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="balanceBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
</body>
</html>
